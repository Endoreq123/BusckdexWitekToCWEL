<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#c0191a">
  <title>BuseDex Kielce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- EKRAN: LISTA -->
  <div id="screen-list" class="screen active">
    <div class="topbar">
      <div class="topbar-left">
        <img class="topbar-herb" src="grafika/herb-kielce.png" alt="Herb Kielc"
             onerror="this.outerHTML='<div class=topbar-herb-missing>herb<br>Kielc</div>'">
        <div>
          <div class="app-title">&#x1F68C; BuseDex</div>
          <div class="app-sub">Kielce &middot; KM</div>
        </div>
        <img class="topbar-herb" src="grafika/herb-swietokrzyskiego.png" alt="Herb Woj."
             onerror="this.outerHTML='<div class=topbar-herb-missing>herb<br>woj.</div>'">
      </div>
      <div>
        <div class="score-big" id="pct-big">0%</div>
        <div class="score-sub" id="pct-sub">0 / 0</div>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="stats-row" id="stats-row"></div>
    <div id="inst-wrap"></div>
    <div class="sw">
      <input class="si" id="si" type="search"
             placeholder="&#x1F50D; numer lub model..."
             autocorrect="off" autocomplete="off">
    </div>
    <div class="frow" id="bf"></div>
    <div class="frow" id="tf"></div>
    <div id="bus-list"></div>
    <div style="height:28px"></div>
  </div>

  <!-- EKRAN: SZCZEGOLY -->
  <div id="screen-detail" class="screen">
    <div class="hdr">
      <button class="bk" id="det-back">&#x2190; Wr&#xF3;&#x107;</button>
      <span class="htit" id="det-title"></span>
      <span style="width:60px"></span>
    </div>
    <div class="dbody" id="det-body"></div>
  </div>

  <!-- EKRAN: ZLAP -->
  <div id="screen-capture" class="screen">
    <div class="hdr">
      <button class="bk" id="cap-back">&#x2190; Wr&#xF3;&#x107;</button>
      <span class="htit" id="cap-title">Z&#x142;ap autobus</span>
      <span style="width:60px"></span>
    </div>
    <div class="abody">
      <div class="ainfo" id="cap-info" style="border-color:#333"></div>
      <div>
        <div class="plbl" style="margin-bottom:6px">&#x1F4F8; Zdj&#x119;cie</div>
        <div class="pbox" id="pbox">
          <div class="pph" id="pph">
            <div style="font-size:44px">&#x1F68C;</div>
            <div>Dotkni&#x105;j aby doda&#x107; zdj&#x119;cie</div>
            <div style="font-size:11px;margin-top:6px;opacity:.5">aparat lub galeria</div>
          </div>
          <img id="pprev" class="pprev" src="" alt="podgl&#x105;d">
        </div>
        <div class="pbtns" style="margin-top:8px">
          <button class="pbtn" id="btn-cam">&#x1F4F7; Aparat</button>
          <button class="pbtn" id="btn-gal">&#x1F5BC; Galeria</button>
          <button class="pbtn" id="btn-del-ph"
                  style="display:none;color:#e74c3c;border-color:#c0392b">&#x1F5D1; Usu&#x144;</button>
        </div>
      </div>
      <div>
        <div class="plbl" style="margin-bottom:6px">&#x1F4DD; Notatka</div>
        <textarea id="note" placeholder="np. linia 1, ul. Sienkiewicza&#x2026;"></textarea>
      </div>
      <button class="btnp" id="btn-save">&#x2705; Zapisz z&#x142;apanie!</button>
    </div>
  </div>

</div>

<input type="file" id="in-cam" accept="image/*" capture="environment"
       style="position:fixed;left:-9999px;opacity:0">
<input type="file" id="in-gal" accept="image/*"
       style="position:fixed;left:-9999px;opacity:0">

<div id="ov">
  <div id="sheet">
    <h3>DODAJ ZDJ&#x118;CIE</h3>
    <button class="mbtn" id="m-cam">&#x1F4F7; Zr&#xF3;b zdj&#x119;cie aparatem</button>
    <button class="mbtn" id="m-gal">&#x1F5BC; Wybierz z galerii</button>
    <button class="mbtn mcancel" id="m-cancel">Anuluj</button>
  </div>
</div>

<div id="toast"></div>
<canvas id="cvs"></canvas>

<!-- ANIMACJA CRT -->
<div id="ca">
  <div class="ca-bezel">
    <div class="ca-sc ca-s1"></div><div class="ca-sc ca-s2"></div>
    <div class="ca-sc ca-s3"></div><div class="ca-sc ca-s4"></div>
    <div class="ca-brand">BUSEDEX &bull; KM KIELCE</div>
    <div class="ca-screen">
      <canvas id="ca-grain"></canvas>
      <div id="ca-tint"></div>
      <div id="ca-il"></div>
      <div class="ca-scanlines"></div>
      <div class="ca-vignette"></div>
      <img id="ca-photo" src="" alt="">
      <div id="ca-noghost" class="ca-noghost" style="display:none">&#x1F68C;</div>
    </div>
    <div class="ca-strip">
      <div class="ca-led" id="ca-led"></div>
      <div class="ca-status" id="ca-status">Z&#x141;APANO</div>
    </div>
  </div>
  <div class="ca-bottom">
    <div class="ca-badge" id="ca-badge"></div>
    <div class="ca-sub"   id="ca-sub"></div>
    <div class="ca-tap">&#x25BA; dotkni&#x105;j aby kontynuowa&#x107;</div>
  </div>
</div>

<!-- kolejnosc skryptow jest wazna -->
<script src="catalog.js"></script>
<script src="render.js"></script>
<script src="app.js"></script>

</body>
</html>
